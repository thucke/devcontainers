name: Cleanup packages

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [typo3-frankenphp, typo3-apache, typo3-nginx]
    permissions:
      packages: write
    steps:
      - name: Get lowercase repo name
        id: lowercase-repo
        run: echo "repo=$(echo ${GITHUB_REPOSITORY@L}|cut -d/ -f2)" >> $GITHUB_OUTPUT

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Maintain tagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ steps.lowercase-repo.outputs.repo }}/${{ matrix.package }}
          delete-untagged: false
          keep-n-tagged: 16
          older-than: 5 weeks
      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ steps.lowercase-repo.outputs.repo }}/${{ matrix.package }}
          delete-untagged: true
          keep-n-untagged: 0
