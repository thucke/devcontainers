name: 'OCI Calver Action'
description: 'GitHub Action to generate the next calendar versioning (calver) version number for OCI images.'
inputs:
  template:
    description: 'Template to test'
    required: true
  config:
    description: 'Additional configuration for the test (JSON object)'
    required: false
    default: '{}'

runs:
  using: composite
  steps:
    - name: Checkout main
      id: checkout_release
      uses: actions/checkout@v6

    - name: Build template
      id: build_template
      shell: bash
      run: ${{ github.action_path }}/build.sh "${{ inputs.template }}" '${{ inputs.config }}'

    - name: Test template
      id: test_template
      shell: bash
      run: ${{ github.action_path }}/test.sh "${{ inputs.template }}" '${{ inputs.config }}'
